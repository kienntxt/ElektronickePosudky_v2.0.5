services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: elektronicke_posudky_db
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_SA_PASSWORD}
      MSSQL_PID: "Express"
      # Reduce memory usage for development
      MSSQL_MEMORY_LIMIT_MB: "2048"
    ports:
      - "1433:1433"
    networks:
      - elektronicke_posudky_network
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - bash
        - -c
        - /opt/mssql-tools/bin/sqlcmd -S db,1433 -U sa -P ${DB_SA_PASSWORD:-TopSecr3t!} -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s
    restart: always

  db.initializer:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_initializer
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./init:/init
    networks:
      - elektronicke_posudky_network
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P '${DB_SA_PASSWORD}' -C -i /init/init.sql -v $DB_NAME='${DB_NAME}' $DB_USER='${DB_USER}' $DB_PASSWORD='${DB_PASSWORD}'"

  # Database Migration Service
  db.migration:
    build:
      context: .
      dockerfile: Dockerfile.migration
    container_name: elektronicke_posudky_migration
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    depends_on:
      db:
        condition: service_healthy
      db.initializer:
        condition: service_started
    networks:
      - elektronicke_posudky_network

  # API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elektronicke_posudky_api
    env_file:
      - .env
    ports:
      - "5000:80"
    environment:
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    depends_on:
      db.migration:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - elektronicke_posudky_network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    # Give the API time to apply migrations and start
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - curl -f http://localhost/swagger/index.html || exit 1
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  sqlserver_data:

networks:
  elektronicke_posudky_network:
    driver: bridge
